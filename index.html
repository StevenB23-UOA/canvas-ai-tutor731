<script>
  
<button onclick="console.log('BUTTON CLICKED'); sendMessage('hello')">
  TEST BUTTON
</button>
console.log("SCRIPT LOADED");
const BACKEND_URL = "https://script.google.com/macros/s/AKfycbydK01Oy9eVwslmO0vmzp8Va-fR7xP78pGHc2GEsvrWprETjZUCFsMDi_35-bQjRz7N/exec";

async function sendMessage(query) {
  const res = await fetch(BACKEND_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prompt: query })
  });

  console.log("STATUS:", res.status);
  console.log("OK:", res.ok);

  const text = await res.text();
  console.log("RAW RESPONSE:", text);

  try {
    const data = JSON.parse(text);
    console.log("PARSED JSON:", data);

    return data.text || "No response";
  } catch (e) {
    console.error("JSON parse failed", e);
    return "Backend did not return JSON";
  }
}
</script>
